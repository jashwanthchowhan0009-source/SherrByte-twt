name: AI Enrichment

# Runs every 30 minutes, offset by 15 from the RSS ingestion job so newly-
# ingested articles get enriched promptly without both jobs fighting for
# database connections at the same moment.
#
# Processes up to 50 un-enriched articles per run. At steady state that's
# plenty — typical ingestion run yields 30-80 new articles.
#
# Required secrets:
#   DATABASE_URL        — Supabase pooled connection string
#   JWT_SECRET          — any non-empty string
#   GEMINI_API_KEY      — from Google AI Studio (primary LLM)
#   GROQ_API_KEY        — from console.groq.com (fallback LLM)
#   REDIS_URL           — Upstash rediss://... (semantic cache)

on:
  schedule:
    # 15 min offset from ingestion (:15 and :45 past the hour)
    - cron: "15,45 * * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max articles to process"
        required: false
        default: "50"

concurrency:
  group: enrich-ai
  cancel-in-progress: false

jobs:
  enrich:
    name: Enrich articles with AI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e "."

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: st-all-minilm-l6-v2

      - name: Run AI enrichment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          APP_ENV: prod
          LOG_FORMAT: json
          LOG_LEVEL: INFO
        run: |
          source .venv/bin/activate
          LIMIT="${{ github.event.inputs.limit || '50' }}"
          python -m app.workers.enrich_ai --limit="$LIMIT"

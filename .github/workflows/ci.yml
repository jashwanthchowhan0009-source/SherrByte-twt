name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Create venv & install deps
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Ruff format check
        run: |
          source .venv/bin/activate
          ruff format --check .

      - name: Mypy
        run: |
          source .venv/bin/activate
          mypy app
        continue-on-error: true   # relaxed in Phase A; tighten in Phase B+

      - name: Pytest
        env:
          # Dummy values so config loads; tests don't actually hit a DB in Phase A
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          JWT_SECRET: "ci-test-secret-not-real"
          APP_ENV: "dev"
        run: |
          source .venv/bin/activate
          pytest -v

  # Phase A: deploy disabled until you've run `fly launch` and added FLY_API_TOKEN
  # to repo secrets. Uncomment when ready.

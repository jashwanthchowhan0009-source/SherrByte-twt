name: Recompute Affinity

on:
  schedule:
    - cron: '30 19 * * *'   # 19:30 UTC = 01:00 IST
  workflow_dispatch:

concurrency:
  group: recompute-affinity
  cancel-in-progress: false

jobs:
  recompute:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install uv
      - run: uv venv && source .venv/bin/activate && uv pip install -e "."
      - run: source .venv/bin/activate && python -m app.workers.recompute_affinity
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL:    ${{ secrets.REDIS_URL }}
          JWT_SECRET:   ${{ secrets.JWT_SECRET }}
          APP_ENV:      prod
          LOG_FORMAT:   json

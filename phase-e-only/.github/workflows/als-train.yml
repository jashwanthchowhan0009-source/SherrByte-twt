name: ALS Training

on:
  schedule:
    - cron: '30 20 * * *'   # 20:30 UTC = 02:00 IST (after affinity recompute)
  workflow_dispatch:

concurrency:
  group: als-train
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install uv
      - run: uv venv && source .venv/bin/activate && uv pip install -e "." && uv pip install "implicit>=0.7.2" "scipy>=1.13.0"
      - run: source .venv/bin/activate && python -m app.workers.als_train
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET:   ${{ secrets.JWT_SECRET }}
          APP_ENV:      prod
          LOG_FORMAT:   json

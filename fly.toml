# Fly.io configuration for SherrByte API.
# Rename `app` value to whatever you picked in `fly launch`.
# Region "bom" = Mumbai, closest to Indian users.

app = "sherrbyte-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "prod"
  LOG_FORMAT = "json"
  PORT = "8000"
  # CORS_ORIGINS = "https://sherrbyte.web.app,https://sherrbyte.com"
  # Set non-secret env here; secrets go via `fly secrets set ...`

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"       # machines spin down when idle → saves free hours
  auto_start_machines = true
  min_machines_running = 0          # set to 1 if you hate cold starts
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    type = "http"
    method = "GET"
    path = "/healthz"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Uncomment when you migrate heavier workers
# [processes]
#   app = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
#   worker = "python -m app.workers.ingest_rss"

[deploy]
  strategy = "rolling"
  release_command = "alembic upgrade head"   # runs migrations before swapping instances
